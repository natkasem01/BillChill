<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BillChill Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f3;
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #667eea;
            color: white;
        }

        .cost {
            font-weight: bold;
            color: #2d3436;
        }

        .empty-msg {
            text-align: center;
            color: #888;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📊 My Subscriptions</h1>
        <div class="form-container">
            <input type="text" id="name" placeholder="Service Name" required>
            <input type="number" id="cost" placeholder="Cost" step="0.01" required>
            <input type="date" id="date" required>
            <button onclick="addSubscription()">➕ Add Bill</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Service</th>
                    <th>Cost</th>
                    <th>Next Bill</th>
                </tr>
            </thead>
            <tbody id="sub-table">
            </tbody>
        </table>
        <div id="no-data" class="empty-msg" style="display:none;">No subscriptions found.</div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('/subscriptions');
                const data = await response.json();
                const tableBody = document.getElementById('sub-table');

                if (data.length === 0) {
                    document.getElementById('no-data').style.display = 'block';
                    return;
                }

                tableBody.innerHTML = data.map(sub => `
                    <tr>
                        <td><strong>${sub.name}</strong></td>
                        <td>${sub.cost} zł</td>
                        <td>${new Date(sub.next_billing_date).toLocaleDateString()}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Failed to load data:", err);
            }
        }
        async function addSubscription() {
            const name = document.getElementById('name').value;
            const cost = document.getElementById('cost').value;
            const date = document.getElementById('date').value;

            if (!name || !cost || !date) {
                return alert("Please fill in all fields!");
            }

            try {
                const response = await fetch('/subscriptions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        cost: parseFloat(cost),
                        next_billing_date: date
                    })
                });

                if (response.ok) {
                    alert("✅ Spotify Added!");
                    location.reload();
                } else {
                    const errorText = await response.text();
                    alert("Server said: " + errorText);
                }
            } catch (err) {
                alert("Connection failed: " + err);
            }
        }
        loadData();
    </script>
</body>

</html>
